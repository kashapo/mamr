<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MAMR</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <meta name="description" content="MAMR — coming soon.">
  <style>
    :root {
      --bg: #f4f7fb;
      --text: #1f2d4a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Arial, Helvetica, sans-serif;
    }

    main {
      text-align: center;
      padding: 32px;
    }

    h1 {
      margin: 0 0 48px;
      font-size: clamp(72px, 13vw, 160px);
      line-height: 0.9;
      letter-spacing: -0.07em;
      font-weight: 900;
    }

    p {
      margin: 0;
      font-size: clamp(20px, 3vw, 34px);
      line-height: 1.25;
      letter-spacing: -0.02em;
    }
  </style>
</head>
<body>
  <main>
    <h1>Coming<br>SOON..</h1>
    <p>Something new is on the way.<br>Stay tuned!</p>
  </main>
</body>
</html>
